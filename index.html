<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구로구 프로그램 모집 공고</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 16px; background: #f5f5f5; }
    h1 { color: #2c3e50; font-size: 1.4em; }
    .updated { color: #888; font-size: 0.85em; margin-bottom: 16px; }
    .card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card a { color: #2980b9; text-decoration: none; font-weight: bold; }
    .card .meta { color: #999; font-size: 0.8em; margin-top: 6px; }
    .source { display: inline-block; background: #eaf4fb; color: #2980b9; font-size: 0.75em; padding: 2px 8px; border-radius: 4px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>📢 구로구 프로그램 모집 공고</h1>
  <div class="updated" id="updated"></div>
  <div id="list"></div>

  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('updated').textContent = '최종 업데이트: ' + data.updated;
        const list = document.getElementById('list');
        if (!data.items.length) {
          list.innerHTML = '<p>공고가 없습니다.</p>';
          return;
        }
        data.items.forEach(item => {
          list.innerHTML += `
            <div class="card">
              <a href="${item.link}" target="_blank">${item.title}</a>
              <div class="meta">${item.date}</div>
              <span class="source">${item.source}</span>
            </div>`;
        });
      });
  </script>
</body>
</html>
