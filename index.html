<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구로구 프로그램 모집</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; }
    header { background: #2d6a4f; color: white; padding: 20px 16px; }
    header h1 { font-size: 1.3em; }
    header p { font-size: 0.85em; opacity: 0.8; margin-top: 4px; }
    .filters { padding: 12px 16px; background: white; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #eee; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 0.85em; cursor: pointer; }
    .filter-btn.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-decoration: none; color: inherit; display: block; }
    .card-img { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; }
    .card-body { padding: 12px; }
    .card-category { font-size: 0.72em; color: #2d6a4f; font-weight: bold; margin-bottom: 4px; }
    .card-title { font-size: 0.9em; font-weight: bold; line-height: 1.4; margin-bottom: 6px; }
    .card-target { font-size: 0.75em; color: #888; }
    .card-date { font-size: 0.72em; color: #aaa; margin-top: 4px; }
    .empty { text-align: center; padding: 40px; color: #aaa; grid-column: 1/-1; }
    .updated { text-align: center; font-size: 0.75em; color: #aaa; padding: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>📢 구로구 프로그램 모집</h1>
    <p id="updated"></p>
  </header>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="전체">전체</button>
    <button class="filter-btn" data-filter="교육">📚 교육</button>
    <button class="filter-btn" data-filter="축제/문화">🎭 축제/문화</button>
    <button class="filter-btn" data-filter="행사">🎉 행사</button>
    <button class="filter-btn" data-filter="복지">💚 복지</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const CATEGORY_COLORS = {
      '교육': '#fff3cd',
      '축제/문화': '#fce4ec',
      '행사': '#e3f2fd',
      '복지': '#e8f5e9',
      '기타': '#f3e5f5'
    };
    const CATEGORY_ICONS = {
      '교육': '📚',
      '축제/문화': '🎭',
      '행사': '🎉',
      '복지': '💚',
      '기타': '📌'
    };

    let allItems = [];
    let currentFilter = '전체';

    function renderCards(items) {
      const grid = document.getElementById('grid');
      if (!items.length) {
        grid.innerHTML = '<div class="empty">해당 공고가 없습니다</div>';
        return;
      }
      grid.innerHTML = items.map(item => `
        <a class="card" href="${item.link}" target="_blank">
          <div class="card-img" style="background:${CATEGORY_COLORS[item.category] || '#f5f5f5'}">
            ${CATEGORY_ICONS[item.category] || '📌'}
          </div>
          <div class="card-body">
            <div class="card-category">${item.category} · ${item.source}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-target">👤 ${item.target}</div>
            <div class="card-date">📅 ${item.date}</div>
          </div>
        </a>
      `).join('');
    }

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = currentFilter === '전체' ? allItems : allItems.filter(i => i.category === currentFilter);
      renderCards(filtered);
    });

    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('updated').textContent = '최종 업데이트: ' + data.updated;
        allItems = data.items;
        renderCards(allItems);
      });
  </script>
</body>
</html>
