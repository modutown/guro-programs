name: Crawl Guro Programs

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (UTC 0시 = KST 9시)
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 크롤러 실행
        run: python crawler.py

      - name: 결과 저장
        run: |
          git config user.name "modutown"
          git config user.email "modutown@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
